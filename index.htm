<body>
  <img src="eskiador.jpg" alt="Esquiador PitStop" class="ski-cross">

  <a href="comanda.html" class="order-btn">DEMANA JA!</a>

  <main class="wrap">
    <header class="top">
      <h1 class="title">PITSTOP</h1>
      <p class="subtitle">Burgers, menús i una experiència ràpida, directa i amb sabor.</p>

      <div class="billboard" aria-label="Galeria destacada de PitStop">
        <img id="billboardImg" src="logo.jpg" alt="Imatge destacada de PitStop">
      </div>
    </header>

    <section class="grid" aria-label="Productes destacats">
      <a
        class="card buy"
        href="https://wa.me/376000000?text=Hola%20PitStop%2C%20vull%201%20Burger%201%2E"
        target="_blank"
        rel="noopener"
        aria-label="Demanar Burger 1 per WhatsApp">
        Burger 1
      </a>

      <div class="card" aria-label="Burger 2">
        Burger 2
      </div>

      <div class="card menu-card" aria-label="Menú Smash">
        <img src="menu-smash.jpg" alt="Menú Smash" class="menu-img">
      </div>

      <div class="card menu-card" aria-label="Menú Normal">
        <img src="menu-normal.jpg" alt="Menú Normal" class="menu-img">
      </div>
    </section>

    <section class="location" aria-labelledby="location-title">
      <h2 id="location-title">On som</h2>

      <div class="map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3025.758367980422!2d1.635220140494224!3d42.58123352121971!2m3!1f0!2f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12af63008f0b2885%3A0xf65c1738ff2b8230!2sHotel%20Segle%20XX%20Andorra!5e1!3m2!1sca!2ses!4v1765742271451!5m2!1sca!2ses"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Mapa de la ubicació de PitStop">
        </iframe>
      </div>

      <p>Toca el mapa per obrir Google Maps.</p>
    </section>

    <section class="reviews" aria-labelledby="reviews-title">
      <h2 id="reviews-title">Ressenyes</h2>

      <form id="reviewForm" class="review-form">
        <input
          type="text"
          id="name"
          name="name"
          placeholder="El teu nom"
          required
        >

        <div class="stars" aria-label="Valoració">
          <span data-value="1" role="button" tabindex="0">★</span>
          <span data-value="2" role="button" tabindex="0">★</span>
          <span data-value="3" role="button" tabindex="0">★</span>
          <span data-value="4" role="button" tabindex="0">★</span>
          <span data-value="5" role="button" tabindex="0">★</span>
        </div>

        <input type="hidden" id="rating" name="rating" value="0">

        <button type="submit">Enviar ressenya</button>
      </form>

      <div id="reviewsList" class="reviews-list" aria-live="polite"></div>
    </section>
  </main>

  <script src="slider.js"></script>
</body>
